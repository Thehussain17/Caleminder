# render.yaml — Render Blueprint for Caleminder
# This file defines both services so Render can auto-configure them.
# After first deploy, update APP_URL and FRONTEND_URL with the real Render URLs.

services:
  # ── Backend Flask API (Docker) ──────────────────────────────────────────────
  - type: web
    name: caleminder-backend
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/auth/status
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: PORT
        value: 5000
      - key: GEMINI_API_KEY
        sync: false          # Set manually in Render dashboard
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: FLASK_SECRET_KEY
        generateValue: true  # Render auto-generates a secure random value
      - key: APP_URL
        sync: false          # Set to https://caleminder-backend.onrender.com after deploy
      - key: FRONTEND_URL
        sync: false          # Set to https://caleminder-frontend.onrender.com after deploy
      - key: FIREBASE_CREDENTIALS_JSON
        sync: false          # Paste contents of firebase_service_account.json here
      - key: TELEGRAM_BOT_API_TOKEN
        sync: false          # Optional

  # ── Frontend React Static Site ───────────────────────────────────────────────
  - type: web
    name: caleminder-frontend
    runtime: static
    plan: free
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    rootDir: frontend
    envVars:
      - key: VITE_API_BASE_URL
        sync: false          # Set to https://caleminder-backend.onrender.com after deploy
    routes:
      - type: rewrite
        source: /*
        destination: /index.html   # SPA fallback for React Router
