<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caleminder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        #chat-window::-webkit-scrollbar { width: 6px; }
        #chat-window::-webkit-scrollbar-track { background: transparent; }
        #chat-window::-webkit-scrollbar-thumb { background: #4a5568; border-radius: 3px; }
        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-900 text-white flex items-center justify-center min-h-screen p-4">

    <div class="flex flex-col w-full max-w-2xl h-[95vh] bg-gray-800/50 backdrop-blur-sm rounded-2xl shadow-2xl border border-gray-700">
        <div class="p-4 border-b border-gray-700 text-center">
            <h1 class="text-xl font-bold">Caleminder</h1>
            <p class="text-xs text-gray-400">Your intelligent scheduling partner</p>
        </div>

        <div id="chat-window" class="flex-1 p-6 overflow-y-auto space-y-6">
            <div class="flex items-start gap-3">
                <div class="bg-indigo-600 p-2 rounded-full flex-shrink-0"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 8V4H8"/><rect x="4" y="4" width="16" height="16" rx="2"/><path d="M4 12h16"/></svg></div>
                <div class="bg-gray-700 p-3 rounded-lg max-w-md">
                    <p class="text-sm">Hello! Describe an event you'd like to schedule, or upload an image of a timetable.</p>
                </div>
            </div>
        </div>

        <div class="p-4 border-t border-gray-700">
            <div id="image-preview-container" class="mb-2 text-center hidden bg-gray-700 p-2 rounded-lg">
                <span id="image-preview-name" class="text-xs text-gray-300"></span>
                <button id="remove-image-btn" class="ml-2 text-red-400 text-xs font-bold">[ X ]</button>
            </div>
            <form id="chat-form" class="flex items-center gap-3">
                <label for="image-upload" class="cursor-pointer p-3 bg-gray-700 hover:bg-gray-600 rounded-lg transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
                    <input type="file" id="image-upload" class="hidden" accept="image/*">
                </label>
                <input type="text" id="message-input" placeholder="e.g., Team meeting tomorrow at 4pm for 1 hour" class="flex-1 bg-gray-700 border-gray-600 rounded-lg p-3 text-sm focus:ring-2 focus:ring-indigo-500 focus:outline-none transition">
                <button type="submit" id="submit-btn" class="bg-indigo-600 hover:bg-indigo-700 text-white font-semibold p-3 rounded-lg transition-colors w-16 h-12 flex items-center justify-center">
                    <svg id="send-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                    <div id="loading-spinner" class="spinner hidden"></div>
                </button>
            </form>
        </div>
    </div>

    <script>
        const chatWindow = document.getElementById('chat-window');
        const chatForm = document.getElementById('chat-form');
        const messageInput = document.getElementById('message-input');
        const imageUpload = document.getElementById('image-upload');
        const imagePreviewContainer = document.getElementById('image-preview-container');
        const imagePreviewName = document.getElementById('image-preview-name');
        const removeImageBtn = document.getElementById('remove-image-btn');
        const submitBtn = document.getElementById('submit-btn');
        const sendIcon = document.getElementById('send-icon');
        const loadingSpinner = document.getElementById('loading-spinner');

        let attachedFile = null;

        imageUpload.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                attachedFile = e.target.files[0];
                imagePreviewName.textContent = attachedFile.name;
                imagePreviewContainer.classList.remove('hidden');
            }
        });

        removeImageBtn.addEventListener('click', () => {
            attachedFile = null;
            imageUpload.value = '';
            imagePreviewContainer.classList.add('hidden');
        });

        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const userMessage = messageInput.value.trim();
            if (!userMessage && !attachedFile) return;

            setLoading(true);

            const formData = new FormData();
            formData.append('message', userMessage);
            if (attachedFile) {
                formData.append('image', attachedFile);
            }

            appendMessage(userMessage, 'user', attachedFile ? attachedFile.name : null);
            resetInput();

            try {
                const response = await fetch('/chat', { method: 'POST', body: formData });
                const data = await response.json();
                appendMessage(data.response, 'ai');
            } catch (error) {
                console.error('Error:', error);
                appendMessage('Sorry, something went wrong. Please check the console.', 'ai');
            } finally {
                setLoading(false);
            }
        });

        function setLoading(isLoading) {
            if (isLoading) {
                submitBtn.disabled = true;
                sendIcon.classList.add('hidden');
                loadingSpinner.classList.remove('hidden');
            } else {
                submitBtn.disabled = false;
                sendIcon.classList.remove('hidden');
                loadingSpinner.classList.add('hidden');
            }
        }

        function resetInput() {
            messageInput.value = '';
            attachedFile = null;
            imageUpload.value = '';
            imagePreviewContainer.classList.add('hidden');
        }

        function appendMessage(text, sender, imageName = null) {
            const messageWrapper = document.createElement('div');
            let content = `<p class="text-sm">${text.replace(/\n/g, '<br>')}</p>`;
            if (imageName) {
                content += `<p class="text-xs mt-2 text-gray-400 border-t border-gray-600 pt-2">Attached: ${imageName}</p>`;
            }

            if (sender === 'user') {
                messageWrapper.className = 'flex items-start gap-3 justify-end';
                messageWrapper.innerHTML = `<div class="bg-indigo-600 p-3 rounded-lg max-w-md">${content}</div>`;
            } else {
                messageWrapper.className = 'flex items-start gap-3';
                messageWrapper.innerHTML = `<div class="bg-gray-700 p-2 rounded-full flex-shrink-0"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 8V4H8"/><rect x="4" y="4" width="16" height="16" rx="2"/><path d="M4 12h16"/></svg></div><div class="bg-gray-700 p-3 rounded-lg max-w-md">${content}</div>`;
            }
            chatWindow.appendChild(messageWrapper);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }
    </script>
</body>
</html>
