<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="bg-white text-gray-900 h-screen flex overflow-hidden">

    <!-- Sidebar -->
    <aside class="w-64 bg-gray-50 border-r border-gray-200 flex flex-col h-full flex-shrink-0">
        <div class="p-4">
            <div class="flex items-center gap-2 mb-6">
                <div class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center text-white font-bold">N</div>
                <h1 class="font-bold text-lg text-gray-800">Nexus AI</h1>
            </div>

            <button onclick="createNewChat()" class="w-full bg-gray-900 hover:bg-gray-800 text-white rounded-lg py-2.5 px-4 flex items-center justify-center gap-2 transition-colors shadow-sm font-medium text-sm">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                New Chat
            </button>
        </div>

        <div class="flex-1 overflow-y-auto px-2 space-y-1" id="chat-history-list">
            <!-- Chat history items will be injected here -->
        </div>

        <div class="p-4 border-t border-gray-200">
            <div class="flex items-center gap-3">
                {% if user.picture %}
                <img src="{{ user.picture }}" alt="Profile" class="w-8 h-8 rounded-full">
                {% else %}
                <div class="w-8 h-8 bg-indigo-100 text-indigo-600 rounded-full flex items-center justify-center font-bold">{{ user.name[0] }}</div>
                {% endif %}
                <div class="flex-1 min-w-0">
                    <p class="text-sm font-medium text-gray-900 truncate">{{ user.name }}</p>
                    <p class="text-xs text-gray-500 truncate">Free Plan</p>
                </div>
                <a href="/logout" class="text-gray-400 hover:text-gray-600">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                </a>
            </div>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col h-full relative">
        {% block content %}{% endblock %}
    </main>

    <script>
        async function loadSessions() {
            try {
                const response = await fetch('/sessions');
                const sessions = await response.json();
                const list = document.getElementById('chat-history-list');
                list.innerHTML = '';

                // Group by date (simplified for now: just list)
                sessions.forEach(session => {
                    const btn = document.createElement('a');
                    btn.href = `/chat/${session.id}`;
                    btn.className = `block px-3 py-2 rounded-lg text-sm text-gray-600 hover:bg-gray-100 truncate transition-colors ${window.location.pathname.includes(session.id) ? 'bg-indigo-50 text-indigo-600 font-medium' : ''}`;
                    btn.textContent = session.title || 'Untitled Chat';
                    list.appendChild(btn);
                });
            } catch (e) {
                console.error("Failed to load sessions", e);
            }
        }

        async function createNewChat() {
            try {
                const response = await fetch('/new_chat', { method: 'POST' });
                const data = await response.json();
                if (data.session_id) {
                    window.location.href = `/chat/${data.session_id}`;
                }
            } catch (e) {
                console.error("Failed to create new chat", e);
            }
        }

        loadSessions();
    </script>
</body>
</html>
