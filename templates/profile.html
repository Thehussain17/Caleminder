<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Profile | Caleminder</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body { font-family: 'Inter', sans-serif; }
    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      border-top-color: #fff;
      animation: spin 1s ease-in-out infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body class="bg-gray-900 text-white flex items-center justify-center min-h-screen p-4">

  <div class="flex flex-col w-full max-w-md bg-gray-800/50 backdrop-blur-sm rounded-2xl shadow-2xl border border-gray-700 p-8">
    
    <div class="text-center mb-6">
      <h1 class="text-2xl font-bold">Edit Profile</h1>
      <p class="text-sm text-gray-400">Manage your Caleminder account details</p>
    </div>

    <form id="profileForm" novalidate class="space-y-5">
      <input type="hidden" id="id" name="id">

      <div>
        <label for="firstname" class="block text-sm font-medium text-gray-300 mb-2">First Name</label>
        <input type="text" id="firstname" name="firstname" required
          class="w-full px-4 py-2 bg-gray-700 border border-gray-600 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none text-sm">
      </div>

      <div>
        <label for="lastname" class="block text-sm font-medium text-gray-300 mb-2">Last Name</label>
        <input type="text" id="lastname" name="lastname" required
          class="w-full px-4 py-2 bg-gray-700 border border-gray-600 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none text-sm">
      </div>

      <div>
        <label for="username" class="block text-sm font-medium text-gray-300 mb-2">Username</label>
        <input type="text" id="username" name="username" required
          class="w-full px-4 py-2 bg-gray-700 border border-gray-600 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none text-sm">
      </div>

      <div>
        <label for="password" class="block text-sm font-medium text-gray-300 mb-2">New Password</label>
        <input type="password" id="password" name="password"
          placeholder="Leave blank to keep current password"
          class="w-full px-4 py-2 bg-gray-700 border border-gray-600 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none text-sm placeholder-gray-500">
        <p class="text-xs text-gray-500 mt-1">Leave blank to keep your current password.</p>
      </div>

      <button type="submit" id="submitButton"
        class="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-2 px-4 rounded-lg font-semibold focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all flex items-center justify-center disabled:bg-gray-500">
        <span id="buttonText">Save Changes</span>
        <div id="buttonSpinner" class="spinner hidden ml-2"></div>
      </button>
    </form>

    <div id="message" class="mt-4 text-center text-sm"></div>

    <div class="text-center mt-6">
      <a href="/index.html" class="text-indigo-400 hover:text-indigo-300 text-sm transition">← Back to Caleminder</a>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const profileForm = document.getElementById('profileForm');
      const submitButton = document.getElementById('submitButton');
      const buttonText = document.getElementById('buttonText');
      const buttonSpinner = document.getElementById('buttonSpinner');
      const messageDiv = document.getElementById('message');
      
      const idInput = document.getElementById('id');
      const firstnameInput = document.getElementById('firstname');
      const lastnameInput = document.getElementById('lastname');
      const usernameInput = document.getElementById('username');
      const passwordInput = document.getElementById('password');

      async function loadUserData() {
        try {
          const res = await fetch('/api/profile');
          const data = await res.json();
          if (!res.ok) {
            showMessage(data.error || 'Failed to load profile', 'error');
            return;
          }
          const currentUser = data.user;
          idInput.value = currentUser.id;
          firstnameInput.value = currentUser.firstname || '';
          lastnameInput.value = currentUser.lastname || '';
          usernameInput.value = currentUser.username || '';
        } catch (err) {
          console.error(err);
          showMessage('Failed to load profile', 'error');
        }
      }
      loadUserData();

      profileForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        setLoading(true);
        showMessage('');

        const formData = new FormData(profileForm);

        try {
          const res = await fetch('/api/profile', { method: 'POST', body: formData });
          const result = await res.json();
          if (res.ok) {
            showMessage(result.message || 'Profile updated', 'success');
            passwordInput.value = '';
          } else {
            showMessage(result.error || 'Failed to update profile', 'error');
          }
        } catch (err) {
          console.error(err);
          showMessage('Error saving profile', 'error');
        } finally {
          setLoading(false);
        }
      });

      function setLoading(isLoading) {
        if (isLoading) {
          submitButton.disabled = true;
          buttonText.textContent = 'Saving...';
          buttonSpinner.classList.remove('hidden');
        } else {
          submitButton.disabled = false;
          buttonText.textContent = 'Save Changes';
          buttonSpinner.classList.add('hidden');
        }
      }

      function showMessage(msg, type) {
        messageDiv.textContent = msg;
        if (!msg) {
          messageDiv.className = 'mt-4 text-center text-sm';
          return;
        }
        messageDiv.className = `mt-4 text-center text-sm ${type === 'success' ? 'text-green-400' : 'text-red-400'}`;
      }

      function fakeApiCall(data) {
        console.log('Simulating API call with data:', data);
        return new Promise((resolve, reject) => {
          setTimeout(() => {
            if (data.username === 'admin') {
              reject(new Error(`❌ This username ('admin') is already taken.`));
              return;
            }
            if (data.username === 'error') {
              reject(new Error(`❌ Error updating user: Server issue.`));
              return;
            }
            if (data.password && data.password.length > 0) {
              resolve({ message: '✅ Profile and password updated successfully!' });
            } else {
              resolve({ message: '✅ Profile updated successfully!' });
            }
          }, 1000);
        });
      }
    });
  </script>
</body>
</html>
