version: '3.8'

services:
  web:
    build: .
    ports:
      - "5000:5000"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - FLASK_SECRET_KEY=${FLASK_SECRET_KEY:-supersecretkey}
      - OAUTHLIB_INSECURE_TRANSPORT=1 # Remove this in production with HTTPS
    volumes:
      - ./user_data.db:/app/user_data.db
      - ./token.pickle:/app/token.pickle # Legacy/backup
